#
# GitHub Pages 自动部署工作流
#
# 触发时机：
#   - push 到 main 分支（且有前端相关文件改动）
#   - 手动触发（workflow_dispatch）
#
# 部署目标：https://feifei21610.github.io/Twinum/
#
# Secrets 配置（GitHub repo Settings → Secrets and variables → Actions）：
#   VITE_SERVER_URL  —  wss://twinum-server.fly.dev
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/shared/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

# 同一时间只允许一个部署任务执行（避免并发冲突）
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
