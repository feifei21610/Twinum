#
# GitHub Pages 自动部署工作流
#
# 触发时机：
#   - push 到 main 分支
#   - 手动触发（workflow_dispatch）
#
# 部署目标：https://feifei21610.github.io/twinum/
#
# 权限说明：需要在仓库 Settings → Pages → Build and deployment
#          Source 设置为 "GitHub Actions"
#
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 同一时间只允许一个部署任务执行（避免并发冲突）
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
